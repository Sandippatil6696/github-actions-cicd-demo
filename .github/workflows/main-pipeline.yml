name: main-pipeline

on:
  push: 
    branches: [ main ]

jobs:

    reusable_build_test:
      uses: ./.github/workflows/reusable-build-test.yml
      with:
        python-version: '3.12'
        run_test: true
    
    reusable_docker:
      needs: reusable_build_test
      uses: ./.github/workflows/reusable-docker.yml
      with:
        image_name: pyton-flask-app-github-actions
        tag: ${{github.sha}}
      secrets:
        docker_username: ${{ secrets.DOCKERHUB_USER_SECRET }}
        docker_token: ${{ secrets.DOCKERHUB_TOKEN }}
      

    deploy:
      runs-on: ubuntu-latest
      needs: reusable_docker
      steps:
        - name: Prints "Deploying image <image_url> to production"
          run: |
            echo "Deploying image ${{ needs.reusable_docker.outputs.image_url }}"
        

    
