name: matrix strategy

on:
  workflow_dispatch:

jobs:
    install-python:
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
          python-version: [ "3.10","3.11"]
      steps:
        - name: install python version ${{ strategy.matrix.python-version }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ strategy.matrix.python-version }}