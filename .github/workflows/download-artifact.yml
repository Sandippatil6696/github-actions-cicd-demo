name: download-artifact-between-jobs

on: workflow_dispatch

jobs:
  generate-and-upload-artifact:
    runs-on: ubuntu-latest
    steps:

    - name: checkout code
      uses: actions/checkout@v4
          
    - name: generate a test report
      run : |
            mkdir -p output/artifacts
            top -c -b -n 1 >>output/artifacts/top-processess.txt

    - name: upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: top-processess
        path: output/artifacts/

  
  download-and-print: 
    runs-on: ubuntu-latest
    needs: generate-and-upload-artifact
    steps:

      - name: downlaod artifact
        uses: actions/download-artifact@v7
        with:
          name: top-processess
        
      - name: read content
        run: cat top-processess.txt
  
  