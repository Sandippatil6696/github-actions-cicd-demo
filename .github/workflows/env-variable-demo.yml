name: env-variable-demo

on: workflow_dispatch

# THIS IS WORKFLOW LEVEL ENV VARIABLE
env:
  APP_NAME: myapp  

jobs:
  
  env-test:
    runs-on: ubuntu-latest

    # THIS IS JOB LEVEL ENV VARIABLE 
    env:
      ENVIRONMENT: staging
    
    steps:
      - name: print all env variable

      # THIS IS STEPS LEVEL ENV VRIABLE
        env:
          VERSION: 1.0.0

        run: |
          echo "application name is $APP_NAME"
          echo "Environment is $ENVIRONMENT"
          echo "App Version is $VERSION"
          echo "commit sha is ${{ github.sha }}"
          echo "who trigger the commit is ${{ github.actor }}"

