name: manual trigger 

on:
    workflow_dispatch:
      inputs:
        environment:
          description: 'Select the environment to deploy'
          required: true
          default: 'production'
          type: choice
          options:
            - production
            - staging
            

jobs:
  manual_trigger:
    runs-on: ubuntu-latest
    steps:
      - name: select environment
        run: echo "Deploying to ${{ github.event.inputs.environment }}"

        