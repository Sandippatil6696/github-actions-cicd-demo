name: os-matrix

on:
  workflow_dispatch:

jobs:
    system-info:
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest, windows-latest, macos-latest]
      steps:
        - name: print the os
          run: echo "The runner is running on ${{ matrix.os }}"
    