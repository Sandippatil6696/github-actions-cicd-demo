name: smart-pipeline 

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    
      - name: checkout code
        uses: actions/checkout@v4

      - name: linting the code
        run: echo "lint the code"
    
  test:
    runs-on: ubuntu-latest
    steps:
    
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: test the code 
        run: echo "testing the code"
    
  summary:
    runs-on: ubuntu-latest
    needs: [lint , test]
    steps:

      - name: summary report
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Push to the MAIN branch"
          else
            echo "Push to a FEATURE branch"
          fi

      - name: print the commit message
        run: echo "the commit message is ${{github.event.head_commit.message}}"

