name: pyhthon-linting

on:
  push:
    branches: [ main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code 
        uses: actions/checkout@v4

      - name: setup python version 3.10 
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install dependencies
        run: pip install -r requirements.txt


      - name: run flake8
        run : flake8 app.py
