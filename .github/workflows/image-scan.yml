# uses trivvy for image scan & CVE's

name: Image scannner

on: 
  workflow_call:


jobs:
  image-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: login to docker hub 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER_SECRET }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: trivy scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USER_SECRET }}/pyton-flask-app-github-actions:${{ github.sha }}
          severity: 'CRITICAL'
          exit-code: '1'