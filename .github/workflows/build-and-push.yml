name: build and push to dockerhub

on:
  workflow_call:


jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: login to docker hub 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER_SECRET }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push 
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER_SECRET }}/pyton-flask-app-github-actions:latest
            ${{ secrets.DOCKERHUB_USER_SECRET }}/pyton-flask-app-github-actions:${{ github.sha }}

      